name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      #  IMPORTANT: clean install (CI safe)
      - name: Install dependencies
        run: npm install

      - name: Fix permissions (optional safety)
        run: chmod +x node_modules/.bin/* || true

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/tripnest-ci
          MONGO_URI: mongodb://127.0.0.1:27017/tripnest-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret
          JWT_SECRET: ci-secret

      - name: Docker build
        run: docker build -t tripnest:${{ github.sha }} .
        env:
          DOCKER_BUILDKIT: 1